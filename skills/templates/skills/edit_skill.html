{% extends 'skills/index.html' %} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title text-center mb-4">✏️ Edit Skills</h4>
        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <input
              type="text"
              name="name"
              value="{{skill.name}}"
              class="form-control"
            />
          </div>
          <div class="mb-3">
            <input
              type="text"
              name="level"
              value="{{skill.level}}"
              class="form-control"
            />
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary w-100">Update</button>
            <a href="{% url 'skill_list' %}" class="btn btn-secondary w-100"
              >Cancel</a
            >
          </div>
        </form>
        {% endblock %}
      </div>
    </div>
  </div>
</div>
